spring:
  application:
    name: blog-agent

blog-agent:
  output-dir: blog-posts
  number-of-keywords: 5

embabel:
  agent:
    platform:
      models:
        openai:
          api-key: ${OPENAI_API_KEY}
    logging:
      personality: starwars
  models:
    default-llm: claude-sonnet-4-6
    llms:
      reviewer: claude-opus-4-6